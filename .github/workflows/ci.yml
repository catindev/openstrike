name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  smoke:
    runs-on: ubuntu-latest
    env:
      GODOT_VERSION: 4.6.3
      GODOT_STATUS: stable
      GODOT_BIN: /tmp/godot/Godot_v4.6.3-stable_linux.x86_64

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download Godot
        run: |
          mkdir -p /tmp/godot
          curl -L \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-${GODOT_STATUS}/Godot_v${GODOT_VERSION}-${GODOT_STATUS}_linux.x86_64.zip" \
            -o /tmp/godot/godot.zip
          unzip -q /tmp/godot/godot.zip -d /tmp/godot
          chmod +x "${GODOT_BIN}"

      - name: Whitespace check
        run: |
          if [[ -n "${GITHUB_BASE_REF:-}" ]]; then
            git diff --check "origin/${GITHUB_BASE_REF}...HEAD"
          else
            git diff --check HEAD~1..HEAD
          fi

      - name: Forbidden asset scan
        run: scripts/check_no_forbidden_assets.sh

      - name: Godot smoke checks
        run: scripts/run_smoke_checks.sh
