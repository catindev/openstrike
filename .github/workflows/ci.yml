name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build and audit (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Debug -DOSK_WARNINGS_AS_ERRORS=ON

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

      - name: Asset audit
        run: python3 tools/asset_audit/asset_audit.py .

      - name: Print config path
        run: |
          if [ "${{ runner.os }}" = "macOS" ]; then
            ./build/apps/client/OpenStrike.app/Contents/MacOS/OpenStrike --print-config-path
          else
            ./build/apps/client/OpenStrike --print-config-path
          fi
